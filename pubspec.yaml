name: myfy

description: Offline Music Downloader & Player

publish_to: 'none'

version: 1.0.0+1

environment:

  sdk: '>=3.0.0 <4.0.0'

dependencies:

  flutter:

    sdk: flutter

  # UI & Icons

  cupertino_icons: ^1.0.8

  google_fonts: ^6.1.0

  

  # API Calls (Termux Backend)

  dio: ^5.4.0

  

  # Audio Player (Offline Playback)

  just_audio: ^0.9.36

  

  # File System & Paths

  path_provider: ^2.1.1

  permission_handler: ^11.0.1

  

  # State Management

  flutter_bloc: ^8.1.3

  equatable: ^2.0.5

  # Utils

  intl: ^0.18.0
  
  audio_metadata_reader: ^0.0.2
  
  audio_video_progress_bar: ^2.0.1
  
  

dev_dependencies:

  flutter_test:

    sdk: flutter

  flutter_lints: ^3.0.0

flutter:

  uses-material-design: true